<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>同人書架</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>* { box-sizing: border-box; } body { margin: 0; padding: 0; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const C = {
  cream: "#f0f6fa", ink: "#1a2a35", accent: "#3a7ca5", accent2: "#6aafd4",
  surface: "#f5fafd", border: "#c8dfe8", tag: "#dff0f8",
};

const DB_NAME = "DoujinShelfDB";
const STORE = "books";
const BOOK_TYPES = ["一般向", "R18", "R18-G", "全年齡"];

function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, 1);
    r.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE, { keyPath: "id" });
    };
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function dbGetAll() {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, "readonly");
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
async function dbPut(item) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, "readwrite");
    const req = tx.objectStore(STORE).put(item);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}
async function dbDelete(id) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, "readwrite");
    const req = tx.objectStore(STORE).delete(id);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}

function compressImage(file) {
  return new Promise((res, rej) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onerror = () => { URL.revokeObjectURL(url); rej(new Error("圖片載入失敗")); };
    img.onload = () => {
      const scale = Math.min(1, 1200 / img.width);
      const canvas = document.createElement("canvas");
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      res({ dataUrl: canvas.toDataURL("image/jpeg", 0.9), mimeType: "image/jpeg" });
    };
    img.src = url;
  });
}

function newBook() {
  return {
    id: Date.now().toString(), coverImage: null, title: "", author: "",
    circle: "", original_work: "", pairing: "", publish_date: "",
    purchase_location: "", book_type: "", tags: [], notes: "",
    createdAt: new Date().toISOString(),
  };
}

// ── 主 App ──────────────────────────────────────────
function App() {
  const [books, setBooks] = useState([]);
  const [view, setView] = useState("shelf");
  const [current, setCurrent] = useState(null);
  const [search, setSearch] = useState("");
  const [filterTag, setFilterTag] = useState("");
  const [loading, setLoading] = useState(false);
  const [loadMsg, setLoadMsg] = useState("");
  const [toast, setToast] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const fabFileRef = useRef();
  const importFileRef = useRef();

  useEffect(() => {
    dbGetAll().then((d) => setBooks(d.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))));
  }, []);

  const showToast = (msg, type) => {
    setToast({ msg, type: type || "ok" });
    setTimeout(() => setToast(null), 2800);
  };

  const reloadBooks = async () => {
    const d = await dbGetAll();
    setBooks(d.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)));
  };

  const handleFiles = async (files) => {
    const arr = Array.from(files);
    if (!arr.length) return;
    setLoading(true);
    setLoadMsg("載入圖片中...");
    try {
      const compressed = await Promise.all(arr.map(compressImage));
      const book = newBook();
      book.coverImage = compressed[0].dataUrl;
      book._ocrImages = compressed.map((c) => c.dataUrl);
      setCurrent(book);
      setView("edit");
    } catch {
      showToast("載入失敗", "err");
    }
    setLoading(false);
    setLoadMsg("");
  };

  const saveBook = async (book) => {
    const b = { ...book };
    delete b._ocrImages;
    await dbPut(b);
    await reloadBooks();
    showToast("已儲存！");
    setView("shelf");
    setCurrent(null);
  };

  const deleteBook = async (id) => {
    await dbDelete(id);
    await reloadBooks();
    setConfirmDel(null);
    setView("shelf");
    showToast("已刪除", "err");
  };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(books, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "doujin-shelf-backup.json";
    a.click();
    URL.revokeObjectURL(url);
    showToast("已匯出！");
  };

  const importJSON = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        for (const b of data) await dbPut(b);
        await reloadBooks();
        showToast("已匯入 " + data.length + " 本！");
      } catch { showToast("匯入失敗", "err"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const allTags = [...new Set(books.flatMap((b) => b.tags || []))];
  const filtered = books.filter((b) => {
    const q = search.toLowerCase();
    const ok = !q || [b.title, b.author, b.circle, b.original_work, b.pairing, ...(b.tags || [])]
      .some((f) => f && f.toLowerCase().includes(q));
    return ok && (!filterTag || (b.tags || []).includes(filterTag));
  });

  const isNew = current && !books.find((b) => b.id === current.id);

  return (
    <div style={{ minHeight: "100vh", background: C.cream, fontFamily: "'Noto Serif TC', Georgia, serif", color: C.ink }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap'); @keyframes spin { to { transform: rotate(360deg); } }`}</style>

      {toast && (
        <div style={{ position: "fixed", bottom: 90, left: "50%", transform: "translateX(-50%)", background: toast.type === "err" ? "#c0392b" : "#2a6496", color: "#fff", padding: "10px 24px", borderRadius: 24, fontSize: 14, zIndex: 200, whiteSpace: "nowrap", boxShadow: "0 4px 16px rgba(0,0,0,0.2)" }}>
          {toast.msg}
        </div>
      )}

      {loading && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 }}>
          <div style={{ background: "#fff", borderRadius: 16, padding: "32px 40px", display: "flex", flexDirection: "column", alignItems: "center", gap: 16 }}>
            <div style={{ width: 40, height: 40, borderRadius: "50%", border: "4px solid #c8dfe8", borderTop: "4px solid #3a7ca5", animation: "spin 0.8s linear infinite" }} />
            <p style={{ margin: 0, fontSize: 15 }}>{loadMsg}</p>
          </div>
        </div>
      )}

      {confirmDel && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 }}>
          <div style={{ background: "#fff", borderRadius: 16, padding: "28px 32px", display: "flex", flexDirection: "column", alignItems: "center", gap: 12, maxWidth: 300 }}>
            <p style={{ margin: 0, fontSize: 17, fontWeight: "bold" }}>確定要刪除這本書嗎？</p>
            <p style={{ margin: 0, fontSize: 13, color: "#888" }}>此操作無法復原</p>
            <div style={{ display: "flex", gap: 12, marginTop: 8 }}>
              <button onClick={() => setConfirmDel(null)} style={{ padding: "8px 20px", borderRadius: 8, background: C.tag, border: "1px solid " + C.border, cursor: "pointer", fontFamily: "inherit" }}>取消</button>
              <button onClick={() => deleteBook(confirmDel)} style={{ padding: "8px 20px", borderRadius: 8, background: "#c0392b", color: "#fff", border: "none", cursor: "pointer", fontFamily: "inherit" }}>刪除</button>
            </div>
          </div>
        </div>
      )}

      <header style={{ position: "sticky", top: 0, zIndex: 10, background: "rgba(240,246,250,0.95)", backdropFilter: "blur(10px)", borderBottom: "1px solid " + C.border, padding: "0 16px" }}>
        <div style={{ maxWidth: 720, margin: "0 auto", height: 56, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 34, height: 34, background: C.accent, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", borderRadius: 8, fontSize: 18, fontWeight: "bold" }}>栞</div>
            <span style={{ fontSize: 18, fontWeight: "bold", letterSpacing: 2, color: C.accent }}>同人書架</span>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={exportJSON} style={{ background: C.tag, border: "1px solid " + C.border, borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontSize: 15, color: C.accent }}>⬇</button>
            <button onClick={() => importFileRef.current && importFileRef.current.click()} style={{ background: C.tag, border: "1px solid " + C.border, borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontSize: 15, color: C.accent }}>⬆</button>
            <input ref={importFileRef} type="file" accept=".json" style={{ display: "none" }} onChange={importJSON} />
          </div>
        </div>
      </header>

      {view === "shelf" && (
        <main style={{ maxWidth: 720, margin: "0 auto", padding: "16px 16px 100px" }}>
          <input
            style={{ width: "100%", padding: "10px 14px", borderRadius: 10, border: "1.5px solid " + C.border, background: C.surface, fontSize: 15, color: C.ink, outline: "none", marginBottom: 12, fontFamily: "inherit" }}
            placeholder="搜尋書名、作者、社團、標籤..."
            value={search} onChange={(e) => setSearch(e.target.value)}
          />
          {allTags.length > 0 && (
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 12 }}>
              {["全部", ...allTags].map((t) => {
                const active = t === "全部" ? !filterTag : filterTag === t;
                return (
                  <button key={t} onClick={() => setFilterTag(t === "全部" ? "" : (filterTag === t ? "" : t))}
                    style={{ padding: "4px 12px", borderRadius: 20, border: "1px solid " + C.border, background: active ? C.accent : C.surface, color: active ? "#fff" : C.accent, fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>
                    {t}
                  </button>
                );
              })}
            </div>
          )}
          <p style={{ fontSize: 13, color: "#999", marginBottom: 12, textAlign: "right" }}>{filtered.length} / {books.length} 本</p>
          {filtered.length === 0 ? (
            <div style={{ textAlign: "center", padding: "60px 20px" }}>
              <p style={{ fontSize: 48, margin: "0 0 12px" }}>📚</p>
              <p style={{ color: "#999" }}>書架還是空的，快去新增第一本吧！</p>
            </div>
          ) : (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(150px, 1fr))", gap: 14 }}>
              {filtered.map((b) => (
                <div key={b.id} onClick={() => { setCurrent(b); setView("detail"); }}
                  style={{ background: C.surface, borderRadius: 12, border: "1px solid " + C.border, overflow: "hidden", cursor: "pointer", boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>
                  <div style={{ width: "100%", aspectRatio: "3/4", position: "relative", background: C.tag, overflow: "hidden" }}>
                    {b.coverImage
                      ? <img src={b.coverImage} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                      : <div style={{ width: "100%", height: "100%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 32 }}>📖</div>
                    }
                    {b.book_type && b.book_type.includes("R18") && (
                      <span style={{ position: "absolute", top: 6, right: 6, background: "#c0392b", color: "#fff", fontSize: 10, padding: "2px 6px", borderRadius: 4, fontWeight: "bold" }}>{b.book_type}</span>
                    )}
                  </div>
                  <div style={{ padding: "8px 10px 10px" }}>
                    <p style={{ fontSize: 13, fontWeight: "bold", margin: "0 0 2px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{b.title || "（無書名）"}</p>
                    <p style={{ fontSize: 11, color: "#888", margin: "0 0 6px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{b.circle || b.author || "—"}</p>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                      {(b.tags || []).slice(0, 3).map((t) => (
                        <span key={t} style={{ background: C.tag, color: C.accent, fontSize: 10, padding: "2px 7px", borderRadius: 10 }}>{t}</span>
                      ))}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </main>
      )}

      {view === "detail" && current && (
        <main style={{ maxWidth: 720, margin: "0 auto", padding: "16px 16px 100px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <button onClick={() => setView("shelf")} style={{ background: "none", border: "none", color: C.accent, fontSize: 15, cursor: "pointer", fontFamily: "inherit" }}>← 返回</button>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => setView("edit")} style={{ background: C.accent, color: "#fff", border: "none", borderRadius: 8, padding: "6px 16px", cursor: "pointer", fontFamily: "inherit" }}>編輯</button>
              <button onClick={() => setConfirmDel(current.id)} style={{ background: "#fde8e8", color: "#c0392b", border: "1px solid #f5c6c6", borderRadius: 8, padding: "6px 16px", cursor: "pointer", fontFamily: "inherit" }}>刪除</button>
            </div>
          </div>
          <div style={{ background: C.surface, borderRadius: 16, border: "1px solid " + C.border, padding: 20, boxShadow: "0 4px 20px rgba(0,0,0,0.06)" }}>
            {current.coverImage && <img src={current.coverImage} alt="" style={{ width: "100%", maxHeight: 320, objectFit: "contain", borderRadius: 10, marginBottom: 16, background: C.tag }} />}
            <h2 style={{ fontSize: 22, fontWeight: "bold", margin: "0 0 16px", lineHeight: 1.4 }}>{current.title || "（無書名）"}</h2>
            <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 16 }}>
              {[["作者", current.author], ["社團", current.circle], ["原作品", current.original_work], ["CP / 角色", current.pairing], ["本種類", current.book_type], ["發行日", current.publish_date], ["購入地點", current.purchase_location], ["備註", current.notes]]
                .filter(([, v]) => v).map(([label, val]) => (
                  <div key={label} style={{ display: "flex", gap: 12 }}>
                    <span style={{ minWidth: 72, fontSize: 13, color: "#888" }}>{label}</span>
                    <span style={{ fontSize: 14, flex: 1, lineHeight: 1.6 }}>{val}</span>
                  </div>
                ))}
            </div>
            {(current.tags || []).length > 0 && (
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {current.tags.map((t) => <span key={t} style={{ padding: "4px 12px", borderRadius: 20, background: C.tag, color: C.accent, fontSize: 13 }}>{t}</span>)}
              </div>
            )}
          </div>
        </main>
      )}

      {view === "edit" && current && (
        <EditView book={current} isNew={isNew} onSave={saveBook} onCancel={() => setView(isNew ? "shelf" : "detail")} />
      )}

      {view === "shelf" && (
        <div style={{ position: "fixed", bottom: 28, right: 24, display: "flex", flexDirection: "column", gap: 12, zIndex: 20 }}>
          <button onClick={() => { setCurrent(newBook()); setView("edit"); }}
            style={{ width: 56, height: 56, borderRadius: "50%", background: C.accent, color: "#fff", fontSize: 28, border: "none", cursor: "pointer", boxShadow: "0 4px 16px rgba(58,124,165,0.4)", display: "flex", alignItems: "center", justifyContent: "center" }}>＋</button>
          <button onClick={() => fabFileRef.current && fabFileRef.current.click()}
            style={{ width: 56, height: 56, borderRadius: "50%", background: C.accent2, color: "#fff", fontSize: 22, border: "none", cursor: "pointer", boxShadow: "0 4px 16px rgba(106,175,212,0.4)", display: "flex", alignItems: "center", justifyContent: "center" }}>📷</button>
          <input ref={fabFileRef} type="file" accept="image/*" multiple style={{ display: "none" }}
            onChange={(e) => { if (e.target.files.length > 0) handleFiles(e.target.files); e.target.value = ""; }} />
        </div>
      )}
    </div>
  );
}

// ── EditView ────────────────────────────────────────
function EditView({ book, isNew, onSave, onCancel }) {
  const [form, setForm] = useState({ ...book });
  const [tagInput, setTagInput] = useState("");
  const [ocrText, setOcrText] = useState("");
  const [ocrLoading, setOcrLoading] = useState(false);
  const aiRef = useRef();
  const coverRef = useRef();

  const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));

  const addTag = () => {
    const t = tagInput.trim();
    if (t && !(form.tags || []).includes(t)) { set("tags", [...(form.tags || []), t]); setTagInput(""); }
  };

  // 有帶圖片進來時自動跑 OCR
  useEffect(() => {
    if (isNew && book._ocrImages && book._ocrImages.length > 0) {
      runOCR(book._ocrImages);
    }
  }, []);

  const runOCR = async (images) => {
    setOcrLoading(true);
    try {
      const texts = [];
      for (const img of images) {
        const { data } = await Tesseract.recognize(img, "jpn+chi_tra+eng", {
          workerPath: "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/worker.min.js",
          langPath: "https://tessdata.projectnaptha.com/4.0.0",
          corePath: "https://cdn.jsdelivr.net/npm/tesseract.js-core@5",
        });
        texts.push(data.text);
      }
      setOcrText(texts.join("\n---\n").trim() || "（未辨識到文字）");
    } catch (e) {
      console.error("OCR error:", e);
      setOcrText("辨識失敗：" + (e?.message || "請開 F12 查看詳細錯誤"));
    }
    setOcrLoading(false);
  };

  const handleCoverUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => set("coverImage", ev.target.result);
    reader.readAsDataURL(file);
    e.target.value = "";
  };

  const handleAiUpload = async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    try {
      const compressed = await Promise.all(files.map(compressImage));
      set("coverImage", compressed[0].dataUrl);
      set("_ocrImages", compressed.map((c) => c.dataUrl));
      runOCR(compressed.map((c) => c.dataUrl));
    } catch (err) {
      setOcrText("圖片載入失敗：" + (err?.message || "請重試"));
    }
    e.target.value = "";
  };

  return (
    <main style={{ maxWidth: 720, margin: "0 auto", padding: "16px 16px 100px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <button onClick={onCancel} style={{ background: "none", border: "none", color: "#3a7ca5", fontSize: 15, cursor: "pointer", fontFamily: "inherit" }}>← 取消</button>
        <button onClick={() => onSave(form)} style={{ background: "#3a7ca5", color: "#fff", border: "none", borderRadius: 8, padding: "8px 20px", cursor: "pointer", fontSize: 15, fontFamily: "inherit" }}>儲存</button>
      </div>

      <div style={{ background: "#f5fafd", borderRadius: 16, border: "1px solid #c8dfe8", padding: "16px 16px 24px", boxShadow: "0 4px 20px rgba(0,0,0,0.06)", display: "flex", flexDirection: "column", gap: 16 }}>

        {/* 上傳辨識區 */}
        <div onClick={() => aiRef.current && aiRef.current.click()}
          style={{ cursor: "pointer", background: "linear-gradient(135deg, #dff0f8, #cce8f4)", borderRadius: 12, border: "2px dashed #6aafd4", padding: "18px 16px", display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 32, pointerEvents: "none" }}>📷</span>
          <span style={{ fontSize: 15, fontWeight: "bold", color: "#3a7ca5", pointerEvents: "none" }}>
            {isNew ? "上傳封面或版權頁" : "重新上傳辨識"}
          </span>
          <span style={{ fontSize: 12, color: "#666", textAlign: "center", pointerEvents: "none" }}>可同時選多張，自動辨識文字供複製</span>
        </div>
        <input ref={aiRef} type="file" accept="image/*" multiple style={{ display: "none" }} onChange={handleAiUpload} />

        {/* OCR 結果 */}
        {(ocrText || ocrLoading) && (
          <div style={{ background: "#f0f6fa", borderRadius: 12, border: "1px solid #c8dfe8", padding: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <span style={{ fontSize: 13, fontWeight: "bold", color: "#3a7ca5" }}>📋 辨識到的文字（點一下全選再複製）</span>
              <button onClick={() => setOcrText("")} style={{ background: "none", border: "none", color: "#aaa", cursor: "pointer", fontSize: 20, lineHeight: 1, padding: 0 }}>×</button>
            </div>
            {ocrLoading
              ? <p style={{ margin: 0, color: "#888", fontSize: 13 }}>辨識中，請稍候...</p>
              : <textarea readOnly value={ocrText} onClick={(e) => e.target.select()}
                  style={{ width: "100%", minHeight: 100, padding: "8px 10px", borderRadius: 8, border: "1px solid #c8dfe8", background: "#fff", fontSize: 13, color: "#1a2a35", resize: "vertical", fontFamily: "monospace", cursor: "text" }} />
            }
          </div>
        )}

        {/* 封面圖 */}
        <div onClick={() => coverRef.current && coverRef.current.click()}
          style={{ width: "100%", aspectRatio: "3/4", maxHeight: 220, background: "#dff0f8", borderRadius: 12, overflow: "hidden", cursor: "pointer", border: "2px dashed #c8dfe8", display: "flex", alignItems: "center", justifyContent: "center" }}>
          {form.coverImage
            ? <img src={form.coverImage} alt="" style={{ width: "100%", height: "100%", objectFit: "contain" }} />
            : <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6, color: "#aaa", fontSize: 13 }}><span style={{ fontSize: 28 }}>🖼️</span>點擊上傳封面圖</div>
          }
        </div>
        <input ref={coverRef} type="file" accept="image/*" style={{ display: "none" }} onChange={handleCoverUpload} />

        {/* 表單欄位 */}
        {[
          { key: "title", label: "書名 *", ph: "輸入書名..." },
          { key: "author", label: "作者", ph: "作者名，多位以逗號分隔" },
          { key: "circle", label: "社團名", ph: "社團名稱" },
          { key: "original_work", label: "原作品", ph: "如：刀劍亂舞、原神..." },
          { key: "pairing", label: "CP / 角色", ph: "如：加州清光x三日月" },
          { key: "publish_date", label: "發行日", ph: "YYYY-MM-DD" },
          { key: "purchase_location", label: "購入地點", ph: "如：C103、BOOTH..." },
        ].map(({ key, label, ph }) => (
          <div key={key} style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <label style={{ fontSize: 13, color: "#888", fontWeight: "bold" }}>{label}</label>
            <input style={{ padding: "9px 12px", borderRadius: 8, border: "1.5px solid #c8dfe8", background: "#f0f6fa", fontSize: 15, color: "#1a2a35", outline: "none", fontFamily: "inherit" }}
              placeholder={ph} value={form[key] || ""} onChange={(e) => set(key, e.target.value)} />
          </div>
        ))}

        {/* 本種類 */}
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          <label style={{ fontSize: 13, color: "#888", fontWeight: "bold" }}>本種類</label>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {BOOK_TYPES.map((t) => (
              <button key={t} onClick={() => set("book_type", form.book_type === t ? "" : t)}
                style={{ padding: "6px 14px", borderRadius: 20, border: "1px solid #c8dfe8", background: form.book_type === t ? "#3a7ca5" : "#f5fafd", color: form.book_type === t ? "#fff" : "#3a7ca5", fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>
                {t}
              </button>
            ))}
          </div>
        </div>

        {/* 標籤 */}
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          <label style={{ fontSize: 13, color: "#888", fontWeight: "bold" }}>標籤</label>
          <div style={{ display: "flex", gap: 8 }}>
            <input style={{ flex: 1, padding: "9px 12px", borderRadius: 8, border: "1.5px solid #c8dfe8", background: "#f0f6fa", fontSize: 15, color: "#1a2a35", outline: "none", fontFamily: "inherit" }}
              placeholder="輸入後按 Enter 或點＋" value={tagInput}
              onChange={(e) => setTagInput(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addTag()} />
            <button onClick={addTag} style={{ padding: "9px 14px", background: "#3a7ca5", color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 16 }}>＋</button>
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 4 }}>
            {(form.tags || []).map((t) => (
              <span key={t} style={{ background: "#dff0f8", color: "#3a7ca5", padding: "4px 10px", borderRadius: 20, fontSize: 13, display: "flex", alignItems: "center", gap: 4 }}>
                {t}
                <span onClick={() => set("tags", (form.tags || []).filter((x) => x !== t))}
                  style={{ cursor: "pointer", color: "#c0392b", fontWeight: "bold" }}>×</span>
              </span>
            ))}
          </div>
        </div>

        {/* 備註 */}
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          <label style={{ fontSize: 13, color: "#888", fontWeight: "bold" }}>備註</label>
          <textarea style={{ padding: "9px 12px", borderRadius: 8, border: "1.5px solid #c8dfe8", background: "#f0f6fa", fontSize: 14, color: "#1a2a35", outline: "none", fontFamily: "inherit", minHeight: 80, resize: "vertical" }}
            placeholder="自由備註..." value={form.notes || ""} onChange={(e) => set("notes", e.target.value)} />
        </div>
      </div>
    </main>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
